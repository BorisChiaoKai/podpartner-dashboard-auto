name: Update Dashboard

on:
  schedule:
    # Run every day at noon UTC
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dashboard build
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TRUSTPILOT_BUSINESS_URL: ${{ secrets.TRUSTPILOT_BUSINESS_URL }}
        run: python build.py

      - name: Run deployment to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: python deploy.py

      - name: Commit updated history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/history.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update dashboard history - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit"
          fi
        continue-on-error: true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: dashboard-output
          path: output/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "Dashboard update failed. Check the logs above for details."
          exit 1
